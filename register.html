<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Barbershop</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --primary: #d4af37; /* Gold */
            --primary-hover: #b5952f;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: rgba(212, 175, 55, 0.2);
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #121212 70%);
        }

        .login-container {
            background: var(--bg-card);
            padding: 30px 40px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.5s ease;
            max-height: 95vh;
            overflow-y: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 38px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        h2 {
            font-weight: 800;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px 10px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
        }

        #msg-box {
            font-size: 13px;
            margin-top: 15px;
            display: none;
            padding: 10px;
            border-radius: 5px;
        }

        .msg-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .msg-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        /* Scrollbar styles for the container */
        .login-container::-webkit-scrollbar {
            width: 6px;
        }
        .login-container::-webkit-scrollbar-thumb {
            background-color: var(--primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo">
            <i class="fas fa-user-plus"></i>
        </div>
        <h2>Create Account</h2>
        <p>Join Barbershop to start managing</p>

        <form id="register-form">
            <div class="form-group">
                <label>Full Name</label>
                <div class="input-wrapper">
                    <i class="fas fa-id-card"></i>
                    <input type="text" id="fullname" placeholder="Enter full name" required>
                </div>
            </div>

            <div class="form-group">
                <label>Username</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Choose a username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>
            </div>

            <button type="submit" class="btn-login">Register</button>
            <div id="msg-box"></div>
            
            <div style="margin-top: 20px; font-size: 14px;">
                <span style="color: var(--text-muted);">Already have an account?</span> 
                <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const fullname = document.getElementById('fullname').value.trim();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('msg-box');

            if(fullname === '' || username === '' || password === '') {
                showMessage('All fields are required!', 'error');
                return;
            }

            // Get existing users or empty array
            let users = [];
            const storedUsersStr = localStorage.getItem('barberpos_users');
            if (storedUsersStr) {
                users = JSON.parse(storedUsersStr);
            }

            // Check if username already exists
            const userExists = users.some(u => u.username === username);
            if (userExists || username === 'admin') {
                showMessage('Username already taken!', 'error');
                return;
            }

            // Add new user
            users.push({
                fullname: fullname,
                username: username,
                password: password
            });

            // Save back to localStorage
            localStorage.setItem('barberpos_users', JSON.stringify(users));
            
            showMessage('Registration successful! Redirecting...', 'success');
            
            // Redirect to login after a short delay
            setTimeout(() => {
                window.location.href = 'login.html';
            }, 1500);
        });

        function showMessage(text, type) {
            const msgBox = document.getElementById('msg-box');
            msgBox.textContent = text;
            msgBox.className = type === 'error' ? 'msg-error' : 'msg-success';
            msgBox.style.display = 'block';
        }
    </script>
</body>
</html>
